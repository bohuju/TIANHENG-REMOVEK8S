services:
  sherpa-runtime-init:
    image: m.daocloud.io/docker.io/alpine:3.21
    restart: "no"
    volumes:
      - sherpa-config:/app/config
      - sherpa-job-logs:/app/job-logs
      - sherpa-tmp:/shared/tmp
      - ./output:/shared/output
    entrypoint:
      - sh
      - -lc
      - |
        set -eu
        for d in /app/config /app/job-logs /shared/tmp /shared/output; do
          mkdir -p "$$d"
          chown 10001:10001 "$$d" || true
          chmod 0777 "$$d" || true
          find "$$d" -mindepth 1 -exec chown 10001:10001 {} + || true
          find "$$d" -mindepth 1 -exec chmod a+rwX {} + || true
        done

  # API backend only: workflow orchestration + task/log/config endpoints.
  sherpa-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        INSTALL_OPENCODE: "1"
    expose:
      - "8001"
    volumes:
      # Persist job logs/config inside a docker volume (fully self-hosted).
      - sherpa-config:/app/config
      # Persist per-job logs in a dedicated volume (separate from config).
      - sherpa-job-logs:/app/job-logs
      # Shared temp volume (must be mounted into the Docker daemon container too).
      - sherpa-tmp:/shared/tmp

      # Artifacts output directory (host-mounted).
      - ./output:/shared/output
      # Dev override: load latest local source without rebuilding the image.
      - ./harness_generator/src:/app/harness_generator/src

      # (Optional) mount a local .env containing API keys (OPENAI_API_KEY / OPENROUTER_API_KEY).
      # - ./.env:/app/.env:ro

      # gbrain source + bun for MCP memory server
      - /home/bohuju/self_project/gbrain:/opt/gbrain:ro
      - /home/bohuju/.bun/bin/bun:/usr/local/bin/bun:ro
    environment:
      # Make Uvicorn bind for container networking (main.py reads these).
      HOST: "0.0.0.0"
      PORT: "8001"

      # Ensure all temp repos land on the shared volume so Docker mounts work.
      TMPDIR: "/tmp"

      # Route docker CLI calls to the dind daemon.
      DOCKER_HOST: "tcp://sherpa-docker:2375"
      DOCKER_BUILDKIT: "1"

      # Default output directory for artifacts (host-mounted).
      SHERPA_OUTPUT_DIR: "/shared/output"
      # CLI backend for code edits (opencode).
      SHERPA_CODEX_CLI: "${SHERPA_CODEX_CLI:-opencode}"
      SHERPA_OPENCODE_DOCKER_IMAGE: "sherpa-opencode:latest"
      SHERPA_OPENCODE_IGNORE_RETRY_ERRORS: "1"
      SHERPA_PARALLEL_FUZZERS: ${SHERPA_PARALLEL_FUZZERS:-2}
      SHERPA_RUN_PARALLEL_EARLY_STOP_ENABLED: ${SHERPA_RUN_PARALLEL_EARLY_STOP_ENABLED:-0}
      SHERPA_RUN_UNLIMITED_ROUND_BUDGET_SEC: ${SHERPA_RUN_UNLIMITED_ROUND_BUDGET_SEC:-7200}

      # Optional Git mirrors for clone operations.
      SHERPA_GIT_MIRRORS: ${SHERPA_GIT_MIRRORS:-https://github.com}

      # LLM provider credentials (provider-neutral).
      LLM_key: ${LLM_key:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-${LLM_key:-}}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-reasoner}
      OPENCODE_MODEL: ${OPENCODE_MODEL:-deepseek-reasoner}
      OPENCODE_CONFIG: "/tmp/sherpa-runtime/opencode.generated.json"
      SHERPA_WEB_JOB_LOG_DIR: "/app/job-logs/jobs"
      DATABASE_URL: ${DATABASE_URL:-postgresql://sherpa:sherpa@postgres:5432/sherpa}
      GBRAIN_DATABASE_URL: ${GBRAIN_DATABASE_URL:-postgresql://postgres:postgres@gbrain-postgres:5432/gbrain_mcp}

      # Optional (fuzz patching): where to read API key env file from.
      # AI_KEY_PATH: "/app/.env"
    depends_on:
      sherpa-runtime-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      sherpa-docker:
        condition: service_healthy
    tmpfs:
      - /tmp

  postgres:
    image: m.daocloud.io/docker.io/library/postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sherpa}
      POSTGRES_USER: ${POSTGRES_USER:-sherpa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sherpa}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sherpa} -d ${POSTGRES_DB:-sherpa}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - sherpa-postgres-data:/var/lib/postgresql/data

  # Dedicated Postgres for GBrain long-term memory.
  gbrain-postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: gbrain_mcp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gbrain_mcp"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - sherpa-gbrain-data:/var/lib/postgresql/data

  # Docker daemon sidecar (dind): build/run fuzz runtime containers.
  sherpa-docker:
    image: m.daocloud.io/docker.io/library/docker:27-dind
    privileged: true
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - ${SHERPA_DOCKER_DNS_1:-1.1.1.1}
      - ${SHERPA_DOCKER_DNS_2:-8.8.8.8}
    entrypoint:
      - sh
      - -lc
      - |
        set -eu
        ARGS="--host=tcp://0.0.0.0:2375 --host=unix:///var/run/docker.sock --tls=false"
        if [ -n "$${SHERPA_DOCKER_REGISTRY_MIRROR:-}" ]; then
          ARGS="$$ARGS --registry-mirror=$${SHERPA_DOCKER_REGISTRY_MIRROR}"
          echo "[*] Using docker registry mirror: $${SHERPA_DOCKER_REGISTRY_MIRROR}"
        fi
        exec dockerd-entrypoint.sh $$ARGS
    healthcheck:
      test: ["CMD-SHELL", "docker info >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    environment:
      DOCKER_TLS_CERTDIR: ""
      DOCKER_HOST: unix:///var/run/docker.sock
      # Route docker daemon egress through host proxy (default: host.docker.internal:7897).
      HTTP_PROXY: ${SHERPA_DOCKER_HTTP_PROXY:-}
      HTTPS_PROXY: ${SHERPA_DOCKER_HTTPS_PROXY:-}
      NO_PROXY: ${SHERPA_DOCKER_NO_PROXY:-localhost,127.0.0.1,::1,host.docker.internal,sherpa-docker}
      http_proxy: ${SHERPA_DOCKER_HTTP_PROXY:-}
      https_proxy: ${SHERPA_DOCKER_HTTPS_PROXY:-}
      no_proxy: ${SHERPA_DOCKER_NO_PROXY:-localhost,127.0.0.1,::1,host.docker.internal,sherpa-docker}
      # Default mirror uses xuanyuan; can still be overridden by local env.
      SHERPA_DOCKER_REGISTRY_MIRROR: ${SHERPA_DOCKER_REGISTRY_MIRROR:-https://7m856d3fdvb9yp.xuanyuan.run}
    volumes:
      - sherpa-docker-data:/var/lib/docker
      - sherpa-config:/app/config
      - sherpa-tmp:/shared/tmp
      - ./output:/shared/output

  # Optional helper image for OpenCode CLI.
  sherpa-opencode:
    build:
      context: .
      dockerfile: docker/Dockerfile.opencode
    image: sherpa-opencode:latest
    restart: "no"
    profiles:
      - opencode
    depends_on:
      sherpa-runtime-init:
        condition: service_completed_successfully
    tmpfs:
      - /tmp

  # Frontend UI service (Next.js).
  sherpa-frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: "/api"
      NEXT_PUBLIC_SENTRY_DSN: "${NEXT_PUBLIC_SENTRY_DSN:-}"
    depends_on:
      sherpa-runtime-init:
        condition: service_completed_successfully
      sherpa-web:
        condition: service_started
    tmpfs:
      - /tmp

  # Single public entrypoint: "/" -> frontend, "/api/*" -> web backend.
  sherpa-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    environment:
      CERT_DIR: /tmp/nginx-certs
      SHERPA_GATEWAY_TLS_HOST: ${SHERPA_GATEWAY_TLS_HOST:-sherpa-gateway.sherpa.orb.local}
      SHERPA_GATEWAY_TLS_DAYS: ${SHERPA_GATEWAY_TLS_DAYS:-3650}
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "8000:80"
      - "${SHERPA_GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/sherpa.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      sherpa-web:
        condition: service_started
      sherpa-frontend:
        condition: service_started
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101,mode=0755
      - /var/run:uid=101,gid=101,mode=0755
      - /tmp:uid=101,gid=101,mode=0755

volumes:
  sherpa-docker-data:
  sherpa-tmp:
  sherpa-config:
  sherpa-job-logs:
  sherpa-gbrain-data:
  sherpa-postgres-data:

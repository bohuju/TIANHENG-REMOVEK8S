<svg width="1300" height="680" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 680">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <marker id="ah-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#DC143C"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- ══════════════ 主线节点 ══════════════ -->

  <!-- init -->
  <rect x="30" y="235" width="110" height="50" rx="6" fill="#E3F2FD" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="85" y="265" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle">init</text>

  <!-- plan -->
  <rect x="195" y="235" width="110" height="50" rx="6" fill="#64B5F6" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="250" y="265" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#fff">plan</text>

  <!-- synthesize -->
  <rect x="360" y="235" width="110" height="50" rx="6" fill="#64B5F6" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="415" y="265" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#fff">synthesize</text>

  <!-- build -->
  <rect x="525" y="235" width="110" height="50" rx="6" fill="#64B5F6" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="580" y="265" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#fff">build</text>

  <!-- run -->
  <rect x="690" y="235" width="110" height="50" rx="6" fill="#64B5F6" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="745" y="265" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#fff">run</text>

  <!-- ══════════════ 覆盖率路径节点 ══════════════ -->

  <!-- coverage-analysis -->
  <rect x="870" y="100" width="140" height="50" rx="6" fill="#64B5F6" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="940" y="123" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">coverage-</text>
  <text x="940" y="139" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">analysis</text>

  <!-- improve-harness -->
  <rect x="1070" y="100" width="140" height="50" rx="6" fill="#64B5F6" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1140" y="123" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">improve-</text>
  <text x="1140" y="139" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fff">harness</text>

  <!-- ══════════════ 崩溃路径节点 ══════════════ -->

  <!-- crash-triage -->
  <rect x="870" y="340" width="140" height="50" rx="6" fill="#F48FB1" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="940" y="363" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">crash-</text>
  <text x="940" y="379" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">triage</text>

  <!-- fix-harness -->
  <rect x="1070" y="340" width="140" height="50" rx="6" fill="#F48FB1" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1140" y="363" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">fix-</text>
  <text x="1140" y="379" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">harness</text>

  <!-- re-build -->
  <rect x="870" y="460" width="140" height="50" rx="6" fill="#F48FB1" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="940" y="490" font-family="Arial,sans-serif" font-size="14" font-weight="bold" text-anchor="middle">re-build</text>

  <!-- re-run -->
  <rect x="1070" y="460" width="140" height="50" rx="6" fill="#F48FB1" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1140" y="490" font-family="Arial,sans-serif" font-size="14" font-weight="bold" text-anchor="middle">re-run</text>

  <!-- crash-analysis -->
  <rect x="1070" y="575" width="140" height="50" rx="6" fill="#CE93D8" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1140" y="598" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">crash-</text>
  <text x="1140" y="614" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">analysis</text>

  <!-- done -->
  <rect x="880" y="575" width="120" height="50" rx="6" fill="#81C784" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="940" y="605" font-family="Arial,sans-serif" font-size="15" font-weight="bold" text-anchor="middle">done</text>

  <!-- ══════════════ 主线箭头 ══════════════ -->

  <!-- init → plan -->
  <line x1="140" y1="260" x2="195" y2="260" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <!-- plan → synthesize -->
  <line x1="305" y1="260" x2="360" y2="260" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <!-- synthesize → build -->
  <line x1="470" y1="260" x2="525" y2="260" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <!-- build → run -->
  <line x1="635" y1="260" x2="690" y2="260" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>

  <!-- ══════════════ build 失败 → plan (红色虚线) ══════════════ -->

  <path d="M 580 235 L 580 200 L 250 200 L 250 235" fill="none" stroke="#DC143C" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#ah-red)"/>
  <text x="420" y="193" font-family="Arial,sans-serif" font-size="11" fill="#DC143C" text-anchor="middle">build failed</text>

  <!-- ══════════════ 覆盖率路径箭头 ══════════════ -->

  <!-- run → coverage-analysis (no crash) -->
  <path d="M 800 245 L 835 245 C 855 245 855 125 870 125" fill="none" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <text x="840" y="190" font-family="Arial,sans-serif" font-size="11" fill="#666">no_crash</text>

  <!-- coverage-analysis → improve-harness -->
  <line x1="1010" y1="125" x2="1070" y2="125" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>

  <!-- improve-harness → build (in_place, 绕回) -->
  <path d="M 1140 150 L 1140 175 L 580 175 L 580 235" fill="none" stroke="#333" stroke-width="1.8" marker-end="url(#ah)"/>
  <text x="860" y="168" font-family="Arial,sans-serif" font-size="11" fill="#666">in_place</text>

  <!-- improve-harness → plan (replan, 红色虚线) -->
  <path d="M 1140 100 L 1140 42 L 250 42 L 250 235" fill="none" stroke="#DC143C" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#ah-red)"/>
  <text x="700" y="34" font-family="Arial,sans-serif" font-size="12" fill="#DC143C" text-anchor="middle">replan</text>

  <!-- ══════════════ 崩溃路径箭头 ══════════════ -->

  <!-- run → crash-triage -->
  <path d="M 745 285 L 745 365 L 870 365" fill="none" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <text x="758" y="330" font-family="Arial,sans-serif" font-size="11" fill="#DC143C">crash_found</text>

  <!-- crash-triage → fix-harness (harness_bug) -->
  <line x1="1010" y1="365" x2="1070" y2="365" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <text x="1040" y="355" font-family="Arial,sans-serif" font-size="10" fill="#666">harness_bug</text>

  <!-- fix-harness → build -->
  <path d="M 1210 340 L 1240 340 L 1240 210 L 635 210 L 635 235" fill="none" stroke="#333" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- crash-triage → re-build (upstream_bug) -->
  <line x1="940" y1="390" x2="940" y2="460" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <text x="953" y="430" font-family="Arial,sans-serif" font-size="10" fill="#666">upstream_bug</text>

  <!-- crash-triage → plan (inconclusive, 红色虚线) -->
  <path d="M 870 380 L 310 380 L 260 285" fill="none" stroke="#DC143C" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ah-red)"/>
  <text x="580" y="395" font-family="Arial,sans-serif" font-size="10" fill="#DC143C">inconclusive</text>

  <!-- re-build → re-run -->
  <line x1="1010" y1="485" x2="1070" y2="485" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>

  <!-- re-run → crash-analysis -->
  <line x1="1140" y1="510" x2="1140" y2="575" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <text x="1155" y="548" font-family="Arial,sans-serif" font-size="10" fill="#666">repro_ok</text>

  <!-- crash-analysis → done (real_bug) -->
  <line x1="1070" y1="600" x2="1000" y2="600" stroke="#333" stroke-width="2" marker-end="url(#ah)"/>
  <text x="1035" y="593" font-family="Arial,sans-serif" font-size="10" fill="#666">real_bug</text>

  <!-- crash-analysis → plan (false_positive, 红色虚线) -->
  <path d="M 1140 625 L 1140 655 L 250 655 L 250 285" fill="none" stroke="#DC143C" stroke-width="1.8" stroke-dasharray="8,4" marker-end="url(#ah-red)"/>
  <text x="700" y="648" font-family="Arial,sans-serif" font-size="12" fill="#DC143C" text-anchor="middle">false_positive → replan</text>

  <!-- re-run → plan (repro failed, 红色虚线) -->
  <path d="M 1070 500 L 310 500 L 265 285" fill="none" stroke="#DC143C" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ah-red)"/>
  <text x="680" y="515" font-family="Arial,sans-serif" font-size="10" fill="#DC143C">repro_failed</text>

  <!-- ══════════════ init 扇出标记 ══════════════ -->
  <text x="85" y="305" font-family="Arial,sans-serif" font-size="10" fill="#999" text-anchor="middle">可恢复到任意阶段</text>

</svg>
